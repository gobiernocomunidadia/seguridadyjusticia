<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Flota Vehicular - Secretaria de Seguridad y Justicia</title>
    
    <!-- Tailwind CSS para el diseño rápido y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes de Google (Montserrat) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colores Institucionales */
            --azul-inst: #19567C;
            --blanco: #FFFFFF;
            
            /* Gama de Azules para las Tarjetas */
            --azul-claro: #4AB5E0;    /* Operativos (Celeste Brillante) */
            --azul-medio: #2980B9;    /* Sin Salida (Azul Medio) */
            --azul-oscuro: #1F618D;   /* Taller (Azul Oscuro) */
            --azul-marino: #154360;   /* Bajas (Azul Marino Profundo) */
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--azul-inst);
            color: var(--blanco);
            min-height: 100vh;
        }

        .glass-panel { 
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .kpi-card {
            background: var(--blanco);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        /* Estilo personalizado para los selects */
        select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%2319567C' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 4 4 4-4'/%3E%3C/svg%3E");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Encabezado del Dashboard -->
    <div class="glass-panel p-6 rounded-xl shadow-lg flex flex-col justify-center items-center text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-extrabold uppercase tracking-wide text-white drop-shadow-md">Control Flota Vehicular</h1>
        <p class="text-base md:text-lg text-white opacity-90 mt-2 font-semibold">Secretaría de Seguridad y Justicia</p>
    </div>

    <!-- Contenedor de Filtros -->
    <div class="max-w-7xl mx-auto mb-8 glass-panel p-4 rounded-xl flex flex-col md:flex-row gap-6 items-center justify-between">
        
        <div class="flex flex-col md:flex-row items-center w-full md:w-1/2 gap-3">
            <label for="filtro-fecha" class="text-white font-bold uppercase tracking-wider text-sm whitespace-nowrap">
                Filtrar por Fecha:
            </label>
            <select id="filtro-fecha" class="w-full p-2.5 rounded-lg bg-white text-[var(--azul-inst)] font-bold outline-none cursor-pointer shadow-inner border-2 border-transparent focus:border-[var(--azul-claro)] transition-colors">
                <!-- Opciones inyectadas vía JS -->
            </select>
        </div>

        <div class="flex flex-col md:flex-row items-center w-full md:w-1/2 gap-3">
            <label for="filtro-direccion" class="text-white font-bold uppercase tracking-wider text-sm whitespace-nowrap">
                Área / Dirección:
            </label>
            <select id="filtro-direccion" class="w-full p-2.5 rounded-lg bg-white text-[var(--azul-inst)] font-bold outline-none cursor-pointer shadow-inner border-2 border-transparent focus:border-[var(--azul-claro)] transition-colors">
                <option value="TODAS">TODAS LAS ÁREAS</option>
                <!-- Opciones inyectadas vía JS -->
            </select>
        </div>

    </div>

    <!-- Contenedor Principal de KPIs -->
    <div class="max-w-7xl mx-auto">
        <h2 class="text-xl font-bold text-white uppercase tracking-wide border-b-2 border-[var(--azul-claro)] pb-2 inline-block mb-6">
            Resumen de Estado de Flota
        </h2>

        <!-- Grid de Tarjetas (KPIs) -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- KPI 1: Operativos (Celeste) -->
            <div class="kpi-card border-b-4 border-[var(--azul-claro)]">
                <h3 class="text-gray-500 font-bold uppercase text-xs tracking-wider">Vehículos Operativos</h3>
                <p class="text-5xl font-extrabold text-[var(--azul-claro)] mt-3 drop-shadow-sm" id="kpi-operativos">0</p>
                <p class="text-xs text-gray-400 mt-2 font-medium">En servicio y circulando</p>
            </div>

            <!-- KPI 2: Operativos Sin Salida (Azul Medio) -->
            <div class="kpi-card border-b-4 border-[var(--azul-medio)]">
                <h3 class="text-gray-500 font-bold uppercase text-xs tracking-wider">Operativos Sin Salida</h3>
                <p class="text-5xl font-extrabold text-[var(--azul-medio)] mt-3 drop-shadow-sm" id="kpi-sin-salida">0</p>
                <p class="text-xs text-gray-400 mt-2 font-medium">No salieron a servicio hoy</p>
            </div>

            <!-- KPI 3: No Operativos / Taller (Azul Oscuro) -->
            <div class="kpi-card border-b-4 border-[var(--azul-oscuro)]">
                <h3 class="text-gray-500 font-bold uppercase text-xs tracking-wider">No Operativos / Taller</h3>
                <p class="text-5xl font-extrabold text-[var(--azul-oscuro)] mt-3 drop-shadow-sm" id="kpi-taller">0</p>
                <p class="text-xs text-gray-400 mt-2 font-medium">Con novedades mecánicas</p>
            </div>

            <!-- KPI 4: Para Baja (Azul Marino Profundo) -->
            <div class="kpi-card border-b-4 border-[var(--azul-marino)]">
                <h3 class="text-gray-500 font-bold uppercase text-xs tracking-wider">Vehículos para Baja</h3>
                <p class="text-5xl font-extrabold text-[var(--azul-marino)] mt-3 drop-shadow-sm" id="kpi-bajas">0</p>
                <p class="text-xs text-gray-400 mt-2 font-medium">Bajas y posibles bajas</p>
            </div>

        </div>
    </div>

    <!-- Script de Inyección y Procesamiento de Datos -->
    <script>
        let datosGlobales = []; // Almacena todos los datos del JSON

        // Formatea fecha YYYY-MM-DD a DD/MM/YYYY para mostrar en el select
        function formatearFechaVista(fechaIso) {
            const partes = fechaIso.split('-');
            if (partes.length === 3) {
                return `${partes[2]}/${partes[1]}/${partes[0]}`;
            }
            return fechaIso;
        }

        // Animación simple de contadores numéricos
        function animarContador(id, finalValue) {
            let startValue = 0;
            let duration = 1000; // 1 segundo
            let stepTime = 20; 
            let steps = duration / stepTime;
            let increment = finalValue / steps;
            let element = document.getElementById(id);
            
            if (finalValue === 0) {
                element.innerText = 0;
                return;
            }

            let timer = setInterval(() => {
                startValue += increment;
                if (startValue >= finalValue) {
                    clearInterval(timer);
                    element.innerText = finalValue;
                } else {
                    element.innerText = Math.floor(startValue);
                }
            }, stepTime);
        }

        // Calcula e inyecta los KPIs basándose en el dataset filtrado
        function calcularKPIs(datosFiltrados) {
            let kpis = {
                operativos: 0,
                sinSalida: 0,
                taller: 0,
                baja: 0
            };

            datosFiltrados.forEach(item => {
                const estado = (item.estado || "").trim().toUpperCase();
                const noSalioHoy = item.no_salió_a_servicio_hoy; // Valor booleano (true/false)

                // Lógica de clasificación estricta solicitada
                if (estado.includes("OPERATIVO") && noSalioHoy === false) {
                    // Estado Operativo Y salió a servicio
                    kpis.operativos++;
                } else if (estado.includes("OPERATIVO") && noSalioHoy === true) {
                    // Estado Operativo Y NO salió a servicio
                    kpis.sinSalida++;
                } else if (estado.includes("BAJA") || estado.includes("RADIADO")) {
                    // Bajas o Radiados
                    kpis.baja++;
                } else {
                    // Taller u otros estados (Taller externo, municipal, verificar estado, etc.)
                    kpis.taller++;
                }
            });

            // Animar los resultados en la pantalla
            animarContador("kpi-operativos", kpis.operativos);
            animarContador("kpi-sin-salida", kpis.sinSalida);
            animarContador("kpi-taller", kpis.taller);
            animarContador("kpi-bajas", kpis.baja);
        }

        // Función que lee los valores de los selects y aplica los filtros
        function aplicarFiltros() {
            const fechaSeleccionada = document.getElementById("filtro-fecha").value;
            const direccionSeleccionada = document.getElementById("filtro-direccion").value;

            // Filtro por Fecha (Extrae la porción YYYY-MM-DD del item.fecha)
            let datosFiltrados = datosGlobales.filter(item => {
                if (!item.fecha) return false;
                return item.fecha.startsWith(fechaSeleccionada);
            });

            // Filtro por Dirección (Si no es "TODAS")
            if (direccionSeleccionada !== "TODAS") {
                datosFiltrados = datosFiltrados.filter(item => 
                    (item.dirección || "SIN ESPECIFICAR") === direccionSeleccionada
                );
            }

            // Recalcular KPIs con el nuevo subconjunto de datos
            calcularKPIs(datosFiltrados);
        }

        // Ejecutar al cargar la página
        window.onload = async () => {
            try {
                // Hacer el fetch de data.json
                const respuesta = await fetch('data.json');
                if (!respuesta.ok) throw new Error("Error HTTP " + respuesta.status);

                datosGlobales = await respuesta.json();

                // 1. Obtener fechas únicas, ordenadas de más reciente a más antigua
                const fechasUnicas = [...new Set(datosGlobales.map(item => {
                    return item.fecha ? item.fecha.split('T')[0] : null;
                }).filter(f => f))].sort((a, b) => new Date(b) - new Date(a));

                // Poblar select de Fechas
                const selectFecha = document.getElementById("filtro-fecha");
                fechasUnicas.forEach(fecha => {
                    const option = document.createElement("option");
                    option.value = fecha;
                    option.textContent = formatearFechaVista(fecha);
                    selectFecha.appendChild(option);
                });
                
                // La fecha más reciente queda seleccionada por defecto al ser la primera (index 0)

                // 2. Obtener Direcciones únicas, ordenadas alfabéticamente
                const direccionesUnicas = [...new Set(datosGlobales.map(item => 
                    item.dirección || "SIN ESPECIFICAR"
                ))].sort();

                // Poblar select de Direcciones
                const selectDireccion = document.getElementById("filtro-direccion");
                direccionesUnicas.forEach(dir => {
                    const option = document.createElement("option");
                    option.value = dir;
                    option.textContent = dir;
                    selectDireccion.appendChild(option);
                });

                // 3. Asignar Event Listeners a los filtros para que se actualicen al cambiar
                selectFecha.addEventListener("change", aplicarFiltros);
                selectDireccion.addEventListener("change", aplicarFiltros);

                // 4. Aplicar filtros iniciales (Última fecha y Todas las direcciones)
                aplicarFiltros();

            } catch (error) {
                console.error("Error inicializando el dashboard:", error);
                document.getElementById("kpi-operativos").innerText = "-";
                document.getElementById("kpi-sin-salida").innerText = "-";
                document.getElementById("kpi-taller").innerText = "-";
                document.getElementById("kpi-bajas").innerText = "-";
                alert("No se pudo cargar el archivo data.json. Asegúrese de estar ejecutando un servidor local.");
            }
        };
    </script>
</body>
</html>
